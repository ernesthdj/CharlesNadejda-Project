# ============================================================
# Charles & Nadejda — Docker Compose
# ============================================================
# Services :
#   mysql      → MySQL 8 (port 3306)  — BDD partagée PHP + C#
#   app        → PHP 8.3-FPM          — Laravel backend
#   nginx      → Nginx                — port 8000 → http://localhost:8000
#   phpmyadmin → phpMyAdmin           — port 8080 → http://localhost:8080
#
# L'app C# Windows Forms tourne en NATIF sur Windows
# et se connecte à MySQL via localhost:3306 (port mappé par Docker).
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # MySQL 8
  # ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: charlesnadejda_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: charlesnadejda
      MYSQL_USER: cn_user
      MYSQL_PASSWORD: cn_password
    ports:
      - "3306:3306"    # Accessible depuis l'app C# via localhost:3306
    volumes:
      - mysql_data:/var/lib/mysql
      # Les scripts SQL dans ./sql/ sont exécutés au 1er démarrage
      # Ordre alphabétique : create_database.sql → seed_data.sql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - cn_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # PHP 8.3-FPM (Laravel)
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: charlesnadejda_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./site-laravel:/var/www   # Code Laravel monté en live-reload
    networks:
      - cn_network
    depends_on:
      mysql:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────
  # Nginx (reverse proxy → PHP-FPM)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: charlesnadejda_nginx
    restart: unless-stopped
    ports:
      - "8000:80"      # Site Laravel → http://localhost:8000
    volumes:
      - ./site-laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cn_network
    depends_on:
      - app

  # ──────────────────────────────────────────────────────────
  # phpMyAdmin
  # ──────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: charlesnadejda_pma
    restart: unless-stopped
    ports:
      - "8080:80"      # phpMyAdmin → http://localhost:8080
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    networks:
      - cn_network
    depends_on:
      mysql:
        condition: service_healthy

# ──────────────────────────────────────────────────────────
# Volumes persistants
# ──────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Réseau interne
# ──────────────────────────────────────────────────────────
networks:
  cn_network:
    driver: bridge
