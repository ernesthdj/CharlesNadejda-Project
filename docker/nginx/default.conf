# ============================================================
# Nginx — Configuration pour Laravel (projet Charles & Nadejda)
# Le trafic HTTP sur port 80 est géré par Nginx
# qui forward les requêtes PHP à PHP-FPM sur app:9000
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Root = dossier public/ de Laravel
    root /var/www/public;
    index index.php index.html;

    # Charset UTF-8 pour les accents (chocolats belges !)
    charset utf-8;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Laravel : toutes les requêtes passent par index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass   app:9000;         # Le container PHP-FPM s'appelle 'app'
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Bloquer l'accès aux fichiers .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Bloquer l'accès aux fichiers sensibles Laravel
    location ~ /\.(env|git) {
        deny all;
    }

    # Cache statique (images, CSS, JS)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
